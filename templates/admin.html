<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SkyBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .header h1 { color: #6366f1; font-size: 24px; }
        .header h1 i { margin-right: 10px; }
        .back-btn {
            background: #6366f1;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1e293b;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card h3 { color: #6366f1; font-size: 32px; margin-bottom: 8px; }
        .stat-card p { color: #94a3b8; font-size: 14px; }
        .users-table {
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .users-table th {
            background: #334155;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #e2e8f0;
        }
        .users-table td {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }
        .users-table tr:hover { background: #263344; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-admin { background: #6366f1; color: white; }
        .badge-user { background: #475569; color: #94a3b8; }
        .empty { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalUsers">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="totalBookings">0</h3>
                <p>Total Bookings</p>
            </div>
        </div>
        <div class="users-table">
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="5" class="empty">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        async function loadData() {
            try {
                const statsRes = await fetch('/api/admin/stats');
                const stats = await statsRes.json();
                document.getElementById('totalUsers').textContent = stats.users || 0;
                document.getElementById('totalBookings').textContent = stats.bookings || 0;
                
                const usersRes = await fetch('/api/admin/users');
                const users = await usersRes.json();
                
                const tbody = document.getElementById('usersBody');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">No users found</td></tr>';
                } else {
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>${u.user_id}</td>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                            <td>${u.phone || '-'}</td>
                            <td>${u.created_at || '-'}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('usersBody').innerHTML = '<tr><td colspan="5" class="empty">Error loading data</td></tr>';
            }
        }
        loadData();
    </script>
</body>
</html>
